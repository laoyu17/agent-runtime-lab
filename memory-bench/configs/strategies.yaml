full_context:
  enabled: true

sliding_window:
  enabled: true
  window_turns: 6

summary_memory:
  enabled: true
  summary_template: |
    用户偏好: {user_preferences}
    硬约束: {hard_constraints}
    已确认实体: {named_entities}
    当前目标: {task_goal}

structured_memory:
  enabled: true
  slots:
    - user_preferences
    - hard_constraints
    - named_entities
    - task_goal
