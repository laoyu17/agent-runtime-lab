seed: 20260301
schema_version: 1
output_dir: outputs
dataset:
  categories:
    preference_memory: 30
    constraint_memory: 30
    slot_memory: 30
    distractor_memory: 30
  default_distractor_level: medium
evaluation:
  golden_subset_per_category: 5
  drift_threshold: 0.03
  collect_latency: true
adapter:
  type: mock
  openai:
    base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    api_key_env: OPENAI_API_KEY
    model: "${OPENAI_MODEL:-gpt-4o-mini}"
